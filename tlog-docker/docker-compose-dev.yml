version: '3.8'

secrets:
  firebase_key:
    file: ${FIREBASE_SERVICE_ACCOUNT_KEY_PATH}

services:
  spring:
    container_name: tlog-spring
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - mysql
      - rabbitmq
    environment:
      # prod / dev 모드 설정
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      MYSQL_URL: ${MYSQL_URL}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MONGO_URI: ${MONGO_URI}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      SSO_NAVER_CLIENT_ID: ${SSO_NAVER_CLIENT_ID}
      SSO_KAKAO_CLIENT_ID: ${SSO_KAKAO_CLIENT_ID}
      SSO_GOOGLE_CLIENT_ID: ${SSO_GOOGLE_CLIENT_ID}
      SSO_NAVER_SECRET: ${SSO_NAVER_SECRET}
      SSO_GOOGLE_SECRET: ${SSO_GOOGLE_SECRET}
      SSO_CALLBACK_URL: ${SSO_CALLBACK_URL}
      TLOG_AI_URL: ${TLOG_AI_URL}
      FIREBASE_SERVICE_ACCOUNT_KEY_PATH: /run/secrets/firebase_key # Docker Secret으로 적용
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
    secrets:
      - firebase_key
    networks:
      - tlog-network
  mysql:
    container_name: tlog-mysql
    image: mysql:8.0
    volumes:
      - tlog-mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: tlog
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tlog-network
  redis:
    container_name: redis-server
    image: redis:latest
    ports:
      - "6379:6379"
    networks:
      - tlog-network
  rabbitmq:
    container_name: rabbitmq-server
    image: rabbitmq:management
    ports:
      - "5672:5672"   # AMQP 프로토콜 포트
      - "15672:15672" # 관리 콘솔 포트
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - tlog-network

networks:
  tlog-network:
    driver: bridge
volumes:
  tlog-mysql-data:
